<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>如玉婚恋 - 核心逻辑恢复版</title>
    <script src="https://imgcache.qq.com/qcloud/cloudbase-js-sdk/2.10.3/cloudbase.full.js"></script>
    <style>
        :root { --main-pink: #ff69b4; --bg-glass: rgba(255, 255, 255, 0.9); }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: sans-serif; background: #fdf2f5; }
        .app-container { display: flex; flex-direction: column; height: 100vh; background: url('https://api.dujin.org/bing/1920.php') center/cover fixed; position: relative; }
        .overlay { position: absolute; inset: 0; backdrop-filter: blur(10px); background: rgba(255,255,255,0.2); z-index: 1; }
        
        .content-wrap { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100vh; }
        #flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* 恢复你之前的卡片美化 */
        .card { display: flex; gap: 10px; background: var(--bg-glass); padding: 12px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); animation: up 0.3s ease; }
        .ava { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; flex-shrink: 0; }
        .nickname { font-weight: bold; color: var(--main-pink); font-size: 0.9rem; margin-bottom: 5px; }
        .mood-img { width: 100%; border-radius: 10px; margin-top: 8px; max-height: 250px; object-fit: cover; }

        /* 底部发布栏 */
        .post-bar { background: #fff; padding: 10px 15px; border-top: 1px solid #eee; }
        .row { display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex: 1; border: 1px solid #eee; padding: 10px 15px; border-radius: 20px; outline: none; background: #f9f9f9; }
        .btn-post { background: var(--main-pink); color: #fff; border: none; padding: 8px 18px; border-radius: 18px; font-weight: bold; cursor: pointer; }
        
        #pre-img { display: none; width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin-top: 10px; border: 2px solid var(--main-pink); }
        @keyframes up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .modal-inner { background: #fff; padding: 25px; border-radius: 20px; width: 80%; max-width: 320px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="overlay"></div>
    <div class="content-wrap">
        <div style="text-align:center; padding:15px; color:#fff; font-weight:bold; text-shadow:0 2px 4px rgba(0,0,0,0.3);">如玉婚恋社区</div>
        
        <div id="flow"></div>

        <div id="publish-ui" class="post-bar" style="display:none;">
            <div class="row">
                <label style="font-size:1.6rem; cursor:pointer;">🖼️<input type="file" id="file-in" accept="image/*" style="display:none;" onchange="handlePreview(this)"></label>
                <input type="text" id="msg-in" placeholder="分享此刻心情...">
                <button class="btn-post" onclick="doSubmit()">发布</button>
            </div>
            <img id="pre-img">
        </div>
    </div>
</div>

<div id="reg-modal" class="modal">
    <div class="modal-inner">
        <h3 style="color:var(--main-pink); margin-bottom:20px;">欢迎加入</h3>
        <input type="text" id="nick-in" placeholder="设置昵称" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px; box-sizing:border-box;">
        <button onclick="saveUser()" style="background:var(--main-pink); color:#fff; border:none; width:100%; padding:12px; border-radius:10px; margin-top:15px; font-weight:bold;">开启缘分</button>
    </div>
</div>

<script>
    // 依然使用你的环境ID
    const app = cloudbase.init({ env: 'ruyu-5glawvibc792700f', region: 'ap-shanghai' });
    const db = app.database();
    let user = null;
    let selectedFile = null;

    async function init() {
        try {
            const auth = app.auth();
            if (!(await auth.getLoginState())) await auth.anonymousAuthProvider().signIn();
            
            // 实时同步
            db.collection('chat_posts').orderBy('time', 'desc').limit(20).watch({
                onChange: (snap) => {
                    const flow = document.getElementById('flow');
                    flow.innerHTML = snap.docs.reverse().map(d => `
                        <div class="card">
                            <img src="${d.avatar}" class="ava">
                            <div style="flex:1">
                                <div class="nickname">${d.nickname}</div>
                                <div style="color:#444; line-height:1.5;">${d.text}</div>
                                ${d.img ? `<img src="${d.img}" class="mood-img">` : ''}
                            </div>
                        </div>
                    `).join('');
                    flow.scrollTop = flow.scrollHeight;
                }
            });
        } catch (e) { console.error("初始化失败", e); }
    }

    function handlePreview(input) {
        if (input.files && input.files[0]) {
            selectedFile = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('pre-img');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(selectedFile);
        }
    }

    async function doSubmit() {
        const text = document.getElementById('msg-in').value.trim();
        if (!text && !selectedFile) return;

        try {
            let fileUrl = "";
            if (selectedFile) {
                // 回归你最开始的上传逻辑
                const path = `posts/${Date.now()}_${selectedFile.name}`;
                const res = await app.uploadFile({ cloudPath: path, filePath: selectedFile });
                const link = await app.getTempFileURL({ fileList: [res.fileID] });
                fileUrl = link.fileList[0].tempFileURL;
            }

            await db.collection('chat_posts').add({
                nickname: user.nickname,
                avatar: user.avatar,
                text: text,
                img: fileUrl,
                time: new Date()
            });

            document.getElementById('msg-in').value = '';
            document.getElementById('pre-img').style.display = 'none';
            selectedFile = null;
        } catch (e) { alert("发布失败，请检查云开发存储权限"); }
    }

    function saveUser() {
        const n = document.getElementById('nick-in').value.trim();
        if (!n) return alert("请取个昵称");
        user = {
            nickname: n,
            avatar: `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(n)}`
        };
        document.getElementById('reg-modal').style.display = 'none';
        document.getElementById('publish-ui').style.display = 'block';
        init();
    }
</script>
</body>
</html>
