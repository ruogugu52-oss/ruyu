<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>如玉婚恋</title>
    <script src="https://imgcache.qq.com/qcloud/cloudbase-js-sdk/2.10.3/cloudbase.full.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; font-family: -apple-system, sans-serif; background: #fdf2f5; }
        
        /* 背景图 1:1 还原 */
        .app-bg {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(to bottom, #fdf2f5, #e8e8fb);
            background-image: url('https://api.dujin.org/bing/1920.php'); /* 建议换成你图中的粉紫色渐变底图 */
            background-size: cover; filter: brightness(0.9) saturate(1.2);
        }

        /* 顶部状态栏 */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 10;
        }
        .header-title { font-size: 18px; color: #333; font-weight: 500; }
        .loc { color: #52c41a; font-size: 16px; }
        .icon-send { font-size: 24px; color: #52c41a; cursor: pointer; transform: rotate(-15deg); }

        /* 聊天区域 */
        #chat-flow { flex: 1; padding: 20px 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; height: calc(100vh - 60px); }
        
        /* 气泡逻辑 */
        .msg-row { display: flex; align-items: flex-start; gap: 10px; max-width: 85%; }
        .msg-row.left { align-self: flex-start; }
        .msg-row.right { align-self: flex-end; flex-direction: row-reverse; }

        .avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1.5px solid #fff; flex-shrink: 0; }
        
        .bubble { 
            padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); word-break: break-all;
        }
        .left .bubble { background: #ff4d6d; color: #fff; border-top-left-radius: 2px; }
        .right .bubble { background: #40a9ff; color: #fff; border-top-right-radius: 2px; }
        
        .msg-img { max-width: 200px; border-radius: 8px; margin-top: 5px; display: block; }

        /* 发布弹窗 */
        #input-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: #fff; 
            padding: 15px; border-top-left-radius: 20px; border-top-right-radius: 20px;
            transform: translateY(100%); transition: 0.3s; z-index: 100;
        }
        #input-panel.active { transform: translateY(0); }
        .input-row { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; background: #f0f0f0; border: none; padding: 12px; border-radius: 10px; outline: none; }
        
        .mask { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:90; }
    </style>
</head>
<body>

<div class="app-bg"></div>

<header>
    <div class="icon-send" onclick="toggleInput()">✈</div>
    <div class="header-title">莉玲婚恋</div>
    <div class="loc">成都</div>
</header>

<div id="chat-flow">
    <!-- 初始假数据用于演示 UI -->
    <div class="msg-row left">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=1" class="avatar">
        <div class="bubble">今天真是倒霉的一天</div>
    </div>
    <div class="msg-row right">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=me" class="avatar">
        <div class="bubble">外滩晚上的风很大、夜景不错👍</div>
    </div>
</div>

<div class="mask" id="mask" onclick="toggleInput()"></div>
<div id="input-panel">
    <div class="input-row">
        <label style="font-size: 24px; cursor: pointer;">📷<input type="file" id="f-in" style="display:none" onchange="preImg()"></label>
        <input type="text" id="t-in" placeholder="输入消息...">
        <button onclick="sendMsg()" style="background:#52c41a; color:white; border:none; padding:10px 15px; border-radius:8px;">发送</button>
    </div>
    <div id="p-box" style="display:none; margin-top:10px;">
        <img id="p-view" style="width:60px; height:60px; border-radius:5px;">
    </div>
</div>

<script>
    const app = cloudbase.init({ env: 'ruyu-5glawvibc792700f', region: 'ap-shanghai' });
    const db = app.database();
    let myUid = "";

    async function init() {
        const auth = app.auth();
        const login = await auth.getLoginState() || await auth.anonymousAuthProvider().signIn();
        myUid = login.user.uid;

        db.collection('chat_posts').orderBy('time', 'desc').limit(20).watch({
            onChange: (sn) => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML = sn.docs.reverse().map(d => {
                    const isMe = d.uid === myUid;
                    return `
                        <div class="msg-row ${isMe ? 'right' : 'left'}">
                            <img src="${d.avatar}" class="avatar">
                            <div class="bubble">
                                ${d.text}
                                ${d.img ? `<img src="${d.img}" class="msg-img">` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                flow.scrollTop = flow.scrollHeight;
            }
        });
    }

    function toggleInput() {
        document.getElementById('input-panel').classList.toggle('active');
        document.getElementById('mask').style.display = 
            document.getElementById('mask').style.display === 'block' ? 'none' : 'block';
    }

    function preImg() {
        const f = document.getElementById('f-in').files[0];
        if (f) {
            const r = new FileReader();
            r.onload = e => {
                document.getElementById('p-view').src = e.target.result;
                document.getElementById('p-box').style.display = 'block';
            };
            r.readAsDataURL(f);
        }
    }

    async function sendMsg() {
        const text = document.getElementById('t-in').value;
        const file = document.getElementById('f-in').files[0];
        if (!text && !file) return;

        let url = "";
        if (file) {
            const res = await app.uploadFile({ cloudPath: `chat/${Date.now()}.jpg`, filePath: file });
            const link = await app.getTempFileURL({ fileList: [res.fileID] });
            url = link.fileList[0].tempFileURL;
        }

        await db.collection('chat_posts').add({
            uid: myUid,
            nickname: "我",
            avatar: `https://api.dicebear.com/7.x/adventurer/svg?seed=${myUid}`,
            text: text,
            img: url,
            time: new Date()
        });

        document.getElementById('t-in').value = "";
        document.getElementById('f-in').value = "";
        document.getElementById('p-box').style.display = "none";
        toggleInput();
    }

    init();
</script>
</body>
</html>
