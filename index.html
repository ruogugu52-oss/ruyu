<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>如玉 · 公益婚恋</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--jade:#4a9b82;--jade-l:#7dc4ad;--jade-d:#276650;--jade-glow:rgba(74,155,130,0.38);--jade-s:rgba(74,155,130,0.10);--gold:#c8a55a;--gold-l:rgba(200,165,90,0.20);--ink:#16203a;--ink-s:rgba(22,32,58,0.55);--ink-f:rgba(22,32,58,0.25);--gl:rgba(255,255,255,0.22);--gl-b:rgba(255,255,255,0.38);--gl-card:rgba(255,255,255,0.26);--blur:saturate(160%) blur(20px);--sh:0 4px 24px rgba(22,32,58,0.08),0 1px 0 rgba(255,255,255,0.5) inset;--sh-lg:0 16px 48px rgba(22,32,58,0.14),0 1px 0 rgba(255,255,255,0.45) inset;--r:18px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans SC',sans-serif;color:var(--ink);background:#b8d4ca;}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 90% 70% at 10% 0%,#a4d4c2 0%,transparent 55%),radial-gradient(ellipse 70% 80% at 90% 90%,#a0ccbe 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 50% 30%,#bce0d4 0%,transparent 55%),linear-gradient(150deg,#c8e4da 0%,#b2cec5 50%,#a4c8bc 100%);}
.bg::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 15%,rgba(200,165,90,0.08) 0%,transparent 35%),radial-gradient(circle at 80% 75%,rgba(200,165,90,0.06) 0%,transparent 30%);animation:bgp 16s ease-in-out infinite alternate;}
@keyframes bgp{from{opacity:.5}to{opacity:1}}
.gc{background:var(--gl-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--gl-b);box-shadow:var(--sh);}
#auth{position:fixed;inset:0;z-index:300;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.auth-wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px 20px;}
.auth-box{width:380px;max-width:100%;border-radius:28px;padding:36px 28px 28px;animation:ri .6s cubic-bezier(.22,1,.36,1);}
@keyframes ri{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
.brand{text-align:center;margin-bottom:26px;}
.brand-orb{width:60px;height:60px;border-radius:50%;margin:0 auto 12px;background:linear-gradient(145deg,#8ecabb,#2d7a62);box-shadow:0 0 0 10px rgba(74,155,130,.10),0 0 38px var(--jade-glow);display:flex;align-items:center;justify-content:center;font-size:26px;animation:orb 5s ease-in-out infinite;}
@keyframes orb{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.brand h1{font-family:'Noto Serif SC',serif;font-size:28px;font-weight:600;color:var(--jade-d);letter-spacing:7px;}
.brand p{font-size:11px;color:var(--ink-s);margin-top:4px;letter-spacing:3px;}
.brand-badge{display:inline-block;margin-top:8px;padding:3px 12px;border-radius:20px;font-size:11px;letter-spacing:2px;background:var(--gold-l);border:1px solid rgba(200,165,90,.35);color:var(--gold);}
.atabs{display:flex;background:rgba(255,255,255,.20);border:1px solid var(--gl-b);border-radius:14px;padding:3px;margin-bottom:20px;}
.atab{flex:1;padding:9px;border:none;background:transparent;border-radius:11px;font-family:inherit;font-size:14px;cursor:pointer;color:var(--ink-s);transition:all .22s;letter-spacing:2px;}
.atab.on{background:rgba(255,255,255,.72);color:var(--jade-d);font-weight:500;}
.aform{display:flex;flex-direction:column;gap:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:12px;color:var(--ink-s);letter-spacing:.5px;}
.fi{padding:11px 14px;border:1px solid rgba(255,255,255,.48);border-radius:12px;background:rgba(255,255,255,.33);font-size:14px;font-family:inherit;color:var(--ink);outline:none;transition:all .2s;}
.fi:focus{border-color:var(--jade-l);background:rgba(255,255,255,.52);}
.fi::placeholder{color:var(--ink-f);}
.ferr{font-size:12px;color:#b03030;min-height:14px;margin-top:-5px;}
.grow{display:flex;gap:10px;}
.gb{flex:1;padding:10px;border:1px solid rgba(255,255,255,.42);border-radius:12px;background:rgba(255,255,255,.22);cursor:pointer;font-size:13px;font-family:inherit;color:var(--ink-s);transition:all .2s;}
.gb.on{border-color:var(--jade-l);background:rgba(74,155,130,.12);color:var(--jade-d);font-weight:500;}
.btn-m{padding:13px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--jade),var(--jade-d));color:#fff;font-family:inherit;font-size:15px;font-weight:500;letter-spacing:3px;cursor:pointer;box-shadow:0 6px 22px var(--jade-glow);transition:all .2s;}
.btn-m:active{transform:scale(.98);}
.alink{text-align:center;font-size:12px;color:var(--ink-s);cursor:pointer;}
.alink:hover{color:var(--jade);}
#app{display:none;position:fixed;inset:0;z-index:1;flex-direction:column;}
#app.on{display:flex;}
.topbar{height:54px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(255,255,255,.18);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid rgba(255,255,255,.30);z-index:50;}
.topbar-logo{font-family:'Noto Serif SC',serif;font-size:18px;color:var(--jade-d);letter-spacing:4px;}
.topbar-logo em{font-style:normal;font-size:10px;color:var(--gold);letter-spacing:2px;margin-left:3px;}
.topbar-r{display:flex;align-items:center;gap:9px;}
.top-av{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.68);background:var(--jade-s);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;cursor:pointer;}
.top-av img{width:100%;height:100%;object-fit:cover;}
.btn-out{padding:5px 11px;border:1px solid rgba(255,255,255,.48);border-radius:8px;background:rgba(255,255,255,.26);font-family:inherit;font-size:12px;color:var(--ink-s);cursor:pointer;transition:all .2s;}
.btn-out:hover{background:rgba(255,255,255,.52);color:var(--jade-d);}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 76px;}
.bot-nav{height:60px;flex-shrink:0;display:flex;align-items:center;background:rgba(255,255,255,.22);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:1px solid rgba(255,255,255,.32);padding-bottom:env(safe-area-inset-bottom);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;padding:6px 0;color:var(--ink-s);transition:all .2s;font-family:inherit;}
.bn .bi{font-size:20px;transition:transform .2s;}
.bn .bl{font-size:10px;letter-spacing:.5px;}
.bn.on{color:var(--jade-d);}
.bn.on .bi{transform:scale(1.15);}
.page{display:none;animation:fu .26s ease;}
.page.on{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ph{text-align:center;padding:16px 0 12px;}
.ph h2{font-family:'Noto Serif SC',serif;font-size:21px;font-weight:400;letter-spacing:4px;color:var(--jade-d);}
.ph p{font-size:11px;color:var(--ink-s);margin-top:4px;letter-spacing:1px;}
.composer{border-radius:var(--r);padding:15px;margin-bottom:14px;}
.comp-top{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
.comp-nm{font-size:13px;color:var(--ink-s);}
.comp-ta{width:100%;border:1px solid rgba(255,255,255,.48);border-radius:12px;padding:10px 13px;background:rgba(255,255,255,.33);font-size:14px;font-family:inherit;color:var(--ink);resize:none;outline:none;min-height:66px;transition:all .2s;}
.comp-ta:focus{border-color:var(--jade-l);background:rgba(255,255,255,.5);}
.comp-ta::placeholder{color:var(--ink-f);}
#iprev{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.prev-i{position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;}
.prev-i img{width:100%;height:100%;object-fit:cover;}
.pdel{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(22,32,58,.55);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
.comp-bot{display:flex;align-items:center;justify-content:space-between;margin-top:9px;}
.btn-ic{padding:6px 11px;border:1px solid rgba(255,255,255,.45);border-radius:8px;background:rgba(255,255,255,.26);cursor:pointer;font-size:12px;color:var(--ink-s);font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:4px;}
.btn-pub{padding:8px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--jade),var(--jade-d));color:#fff;font-family:inherit;font-size:13px;font-weight:500;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 14px var(--jade-glow);transition:all .2s;}
.btn-pub:active{transform:scale(.97);}
.post{border-radius:var(--r);padding:15px;margin-bottom:12px;}
.post-hd{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.pav{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.68);background:var(--jade-s);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0;}
.pav img{width:100%;height:100%;object-fit:cover;}
.pmeta{flex:1;}
.pnm{font-weight:600;font-size:14px;}
.pinfo{font-size:11px;color:var(--ink-s);margin-top:2px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.ptag{padding:1px 6px;border-radius:5px;font-size:10px;background:rgba(74,155,130,.10);color:var(--jade-d);border:1px solid rgba(74,155,130,.16);}
.pbody{font-size:14px;line-height:1.82;white-space:pre-wrap;margin-bottom:10px;color:var(--ink);}
.pimgs{display:grid;gap:4px;margin-bottom:10px;}
.pimgs.one{grid-template-columns:1fr;}
.pimgs.two{grid-template-columns:1fr 1fr;}
.pimgs.three{grid-template-columns:1fr 1fr 1fr;}
.pimgs img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;cursor:pointer;transition:transform .2s;}
.pimgs img:active{transform:scale(.98);}
.pacts{display:flex;gap:2px;padding-top:9px;border-top:1px solid rgba(255,255,255,.35);}
.abtn{display:flex;align-items:center;gap:3px;padding:6px 8px;border:none;background:transparent;cursor:pointer;font-size:12px;color:var(--ink-s);border-radius:7px;font-family:inherit;transition:all .2s;flex:1;justify-content:center;}
.abtn:active{background:rgba(255,255,255,.36);}
.abtn.on{color:var(--jade);}
.coms{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.35);display:none;}
.coms.on{display:block;}
.citem{display:flex;gap:7px;margin-bottom:7px;}
.cav{width:26px;height:26px;border-radius:50%;background:var(--jade-s);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;overflow:hidden;border:1.5px solid rgba(255,255,255,.58);}
.cav img{width:100%;height:100%;object-fit:cover;}
.cbody{background:rgba(255,255,255,.26);border-radius:10px;padding:6px 10px;flex:1;border:1px solid rgba(255,255,255,.38);}
.cnm{font-size:11px;font-weight:600;color:var(--jade-d);}
.ctxt{font-size:13px;margin-top:1px;color:var(--ink);}
.crow{display:flex;gap:6px;margin-top:8px;}
.cinp{flex:1;padding:7px 12px;border:1px solid rgba(255,255,255,.45);border-radius:17px;font-family:inherit;font-size:13px;background:rgba(255,255,255,.26);outline:none;color:var(--ink);}
.cinp::placeholder{color:var(--ink-f);}
.btn-snd{padding:7px 14px;background:var(--jade);color:#fff;border:none;border-radius:17px;font-family:inherit;font-size:13px;cursor:pointer;}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.fchip{padding:5px 13px;border:1px solid rgba(255,255,255,.45);border-radius:16px;background:rgba(255,255,255,.22);font-family:inherit;font-size:12px;cursor:pointer;color:var(--ink-s);transition:all .2s;}
.fchip.on{border-color:var(--jade-l);background:rgba(74,155,130,.11);color:var(--jade-d);}
.ugrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;}
.ucard{border-radius:var(--r);padding:16px 11px;text-align:center;cursor:pointer;transition:all .22s;}
.ucard:active{transform:scale(.97);}
.ucav{width:58px;height:58px;border-radius:50%;margin:0 auto 8px;background:var(--jade-s);display:flex;align-items:center;justify-content:center;font-size:26px;border:2.5px solid rgba(255,255,255,.68);overflow:hidden;}
.ucav img{width:100%;height:100%;object-fit:cover;}
.ucnm{font-size:14px;font-weight:600;}
.ucsub{font-size:11px;color:var(--ink-s);margin-top:2px;}
.uctags{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:7px;}
.utag{padding:2px 7px;border-radius:5px;font-size:10px;background:rgba(74,155,130,.10);color:var(--jade-d);border:1px solid rgba(74,155,130,.16);}
.btn-flw{margin-top:9px;width:100%;padding:7px;border:1px solid var(--jade-l);border-radius:9px;background:transparent;color:var(--jade-d);font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s;}
.btn-flw.on{background:var(--jade);color:#fff;border-color:var(--jade);}
.marry-card{border-radius:var(--r);padding:15px;margin-bottom:12px;}
.marry-hd{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.marry-badge{padding:2px 9px;border-radius:9px;font-size:10px;letter-spacing:1px;background:var(--gold-l);border:1px solid rgba(200,165,90,.28);color:var(--gold);}
.marry-body{font-size:14px;line-height:1.82;color:var(--ink);white-space:pre-wrap;}
.marry-foot{margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,.32);display:flex;justify-content:space-between;align-items:center;}
.marry-info{font-size:11px;color:var(--ink-s);}
.prof-hero{border-radius:var(--r);padding:22px 18px;margin-bottom:12px;position:relative;overflow:hidden;color:#fff;background:linear-gradient(135deg,rgba(74,155,130,.52),rgba(38,100,78,.65));backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,.30);box-shadow:var(--sh-lg);}
.prof-hero::before{content:'玉';position:absolute;right:-12px;bottom:-32px;font-family:'Noto Serif SC',serif;font-size:150px;opacity:.05;font-weight:700;color:#fff;}
.prof-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.pav-wrap{width:74px;height:74px;border-radius:50%;border:2.5px solid rgba(255,255,255,.55);background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:34px;cursor:pointer;position:relative;overflow:hidden;flex-shrink:0;}
.pav-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pav-wrap:active::after{content:'📷';position:absolute;inset:0;background:rgba(22,32,58,.42);display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:50%;}
.pinfo h2{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:400;letter-spacing:2px;}
.pinfo p{opacity:.78;font-size:12px;margin-top:2px;}
.pbadge{display:inline-block;margin-top:5px;padding:2px 9px;border-radius:11px;border:1px solid rgba(200,165,90,.52);background:rgba(200,165,90,.14);font-size:10px;color:rgba(255,235,150,1);letter-spacing:2px;}
.pstats{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.22);padding-top:13px;}
.st{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,.18);}
.st:last-child{border-right:none;}
.st-n{font-size:20px;font-weight:700;}
.st-l{font-size:10px;opacity:.7;margin-top:1px;letter-spacing:1px;}
.psec{border-radius:var(--r);padding:16px;margin-bottom:12px;}
.stitle{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:400;color:var(--jade-d);margin-bottom:13px;letter-spacing:2px;display:flex;align-items:center;gap:6px;}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(74,155,130,.22),transparent);}
.eform{display:flex;flex-direction:column;gap:10px;}
.erow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.elb{font-size:11px;color:var(--ink-s);margin-bottom:3px;}
.ein{width:100%;padding:9px 12px;border:1px solid rgba(255,255,255,.48);border-radius:11px;background:rgba(255,255,255,.30);font-size:13px;font-family:inherit;color:var(--ink);outline:none;}
.ein::placeholder{color:var(--ink-f);}
.eta{width:100%;padding:9px 12px;border:1px solid rgba(255,255,255,.48);border-radius:11px;background:rgba(255,255,255,.30);font-size:13px;font-family:inherit;color:var(--ink);outline:none;resize:none;min-height:64px;}
.eta::placeholder{color:var(--ink-f);}
.pwd-wrap{border-top:1px solid rgba(255,255,255,.28);padding-top:13px;margin-top:3px;}
.pwd-title{font-size:12px;color:var(--ink-s);margin-bottom:9px;}
.vis-item{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.26);}
.vis-item:last-child{border-bottom:none;}
.vis-av{width:36px;height:36px;border-radius:50%;background:var(--jade-s);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;border:1.5px solid rgba(255,255,255,.55);}
.vis-av img{width:100%;height:100%;object-fit:cover;}
.vis-name{font-size:14px;font-weight:500;flex:1;}
.vis-time{font-size:11px;color:var(--ink-s);}
.empty{text-align:center;padding:36px 20px;color:var(--ink-s);}
.eico{font-size:38px;margin-bottom:9px;opacity:.48;}
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(48px);background:rgba(22,32,58,.88);backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;transition:transform .26s ease;pointer-events:none;border:1px solid rgba(255,255,255,.11);}
#toast.on{transform:translateX(-50%) translateY(0);}
.imodal{position:fixed;inset:0;background:rgba(22,32,58,.9);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.imodal.on{display:flex;}
.imodal img{max-width:92vw;max-height:88vh;border-radius:13px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(74,155,130,.24);border-radius:2px;}
@media(min-width:600px){.ugrid{grid-template-columns:repeat(3,1fr);}.scroll-area{max-width:620px;margin:0 auto;}}
</style>
</head>
<body>
<div class="bg"></div>
<div id="auth">
  <div class="auth-wrap">
    <div class="auth-box gc">
      <div class="brand">
        <div class="brand-orb">🪬</div>
        <h1>如 玉</h1>
        <p>公益婚恋 · 真诚相遇</p>
        <span class="brand-badge">❤ 免费 · 公益 · 用心</span>
      </div>
      <div class="atabs">
        <button class="atab on" onclick="switchTab('login')">登 录</button>
        <button class="atab" onclick="switchTab('reg')">注 册</button>
      </div>
      <div id="f-login" class="aform">
        <div class="fg"><label>账号（手机号 / 邮箱）</label><input class="fi" id="l-em" type="text" placeholder="请输入账号"></div>
        <div class="fg"><label>密码</label><input class="fi" id="l-pw" type="password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div class="ferr" id="l-err"></div>
        <button class="btn-m" onclick="doLogin()">登 录</button>
        <p class="alink" onclick="switchTab('reg')">还没有账号？立即免费注册 →</p>
      </div>
      <div id="f-reg" class="aform" style="display:none">
        <div class="fg"><label>昵称</label><input class="fi" id="r-nm" placeholder="您希望别人怎么称呼您"></div>
        <div class="fg"><label>账号（手机号 / 邮箱）</label><input class="fi" id="r-em" placeholder="用于登录"></div>
        <div class="fg"><label>年龄（须满18周岁）</label><input class="fi" id="r-age" type="number" placeholder="您的年龄" min="18" max="99"></div>
        <div class="fg"><label>性别</label>
          <div class="grow">
            <button class="gb" onclick="pickG(this,'male')">👨 先生</button>
            <button class="gb" onclick="pickG(this,'female')">👩 女士</button>
          </div>
        </div>

function renderDisc(ft){
  let us=DB.users().filter(x=>x.id!==U.id);
  if(ft==='female')us=us.filter(x=>x.gender==='female');
  else if(ft==='male')us=us.filter(x=>x.gender==='male');
  else if(ft==='new')us=[...us].sort((a,b)=>(b.joinTime||0)-(a.joinTime||0));
  else us=[...us].sort((a,b)=>(b.likeCount||0)-(a.likeCount||0));
  const g=document.getElementById('ugrid');g.innerHTML='';
  if(!us.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="eico">🔍</div><p>暂无用户</p></div>';return;}
  const fl=DB.flws(U.id);
  us.forEach(u=>{
    const fol=fl.includes(u.id);
    const tags=(u.hobby||'').split(',').filter(Boolean).slice(0,3);
    const d=document.createElement('div');d.className='ucard gc';
    const ua=u.avatar?`<img src="${u.avatar}">`:(u.emoji||'🧑');
    d.innerHTML=`<div class="ucav">${ua}</div><div class="ucnm">${esc(u.name)}</div><div class="ucsub">${u.age||'?'}岁 · ${u.city||'未知'}</div><div class="uctags">${tags.map(t=>`<span class="utag">${esc(t.trim())}</span>`).join('')||'<span class="utag">神秘</span>'}</div><button class="btn-flw ${fol?'on':''}" onclick="event.stopPropagation();toggleFlw(this,'${u.id}')">${fol?'✓ 已关注':'+ 关注'}</button>`;
    d.onclick=()=>recordVisitTo(u.id);
    g.appendChild(d);
  });
}
function filt(t,btn){document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));btn.classList.add('on');renderDisc(t==='all'?null:t);}
function toggleFlw(btn,uid){
  const fl=DB.flws(U.id),i=fl.indexOf(uid);
  if(i>=0){fl.splice(i,1);btn.classList.remove('on');btn.textContent='+ 关注';toast('已取消关注');}
  else{fl.push(uid);btn.classList.add('on');btn.textContent='✓ 已关注';toast('💕 关注成功');}
  DB.sFlws(U.id,fl);updateStats();
}
function recordVisitTo(targetUid){
  if(!targetUid||targetUid===U.id)return;
  const vis=DB.vis(targetUid);
  const ei=vis.findIndex(v=>v.uid===U.id);
  const entry={uid:U.id,name:U.name,emoji:U.emoji,avatar:U.avatar,ts:Date.now()};
  if(ei>=0)vis.splice(ei,1);
  vis.unshift(entry);
  DB.sVis(targetUid,vis.slice(0,20));
}
function renderMarry(){
  const list=DB.marry().sort((a,b)=>b.ts-a.ts);
  const c=document.getElementById('marry-list');c.innerHTML='';
  if(!list.length){c.innerHTML='<div class="empty"><div class="eico">💌</div><p>还没有征婚帖，来发第一条吧～</p></div>';return;}
  list.forEach(m=>{
    const d=document.createElement('div');d.className='marry-card gc';
    const av=m.av?`<img src="${m.av}">`:(m.emoji||'🧑');
    d.innerHTML=`<div class="marry-hd"><div class="pav">${av}</div><div class="pmeta"><div class="pnm">${esc(m.name)}</div><div class="pinfo"><span class="marry-badge">${m.gender==='female'?'👩 女士':'👨 先生'}</span>${m.age?`<span class="ptag">${m.age}岁</span>`:''}${m.city?`<span class="ptag">📍${esc(m.city)}</span>`:''}</div></div></div><div class="marry-body">${esc(m.body)}</div><div class="marry-foot"><span class="marry-info">${m.time}</span></div>`;
    c.appendChild(d);
  });
}
function pubMarry(){
  const body=document.getElementById('marry-ta').value.trim();
  if(!body){toast('请填写征婚内容');return;}
  const list=DB.marry();
  list.unshift({id:'m_'+Date.now(),uid:U.id,name:U.name,emoji:U.emoji,av:U.avatar,age:U.age,city:U.city,gender:U.gender||gender,body,time:'刚刚',ts:Date.now()});
  DB.sMarry(list);document.getElementById('marry-ta').value='';renderMarry();toast('💌 征婚帖已发布');
}
function loadProf(){
  document.getElementById('e-nm').value=U.name||'';
  document.getElementById('e-age').value=U.age||'';
  document.getElementById('e-city').value=U.city||'';
  document.getElementById('e-job').value=U.job||'';
  document.getElementById('e-bio').value=U.bio||'';
  document.getElementById('e-hob').value=U.hobby||'';
  document.getElementById('p-old').value='';
  document.getElementById('p-new').value='';
  refreshHero();updateStats();renderMyPosts();renderVisitors();renderFavs();
}
function refreshHero(){
  document.getElementById('p-name').textContent=U.name;
  document.getElementById('p-bio').textContent=U.bio||'这个人还没留下什么...';
  const el=document.getElementById('p-av');
  el.innerHTML=U.avatar?`<img src="${U.avatar}">`:(U.emoji||'🧑');
}
function updateStats(){
  document.getElementById('s-post').textContent=DB.posts().filter(x=>x.uid===U.id).length;
  document.getElementById('s-like').textContent=(DB.users().find(x=>x.id===U.id)||U).likeCount||0;
  document.getElementById('s-flw').textContent=DB.flws(U.id).length;
  document.getElementById('s-fav').textContent=DB.favs(U.id).length;
}
function renderVisitors(){
  const vis=DB.vis(U.id);
  const c=document.getElementById('vis-list');c.innerHTML='';
  if(!vis.length){c.innerHTML='<div class="empty" style="padding:18px"><div class="eico">👀</div><p>还没有人来看过你</p></div>';return;}
  vis.slice(0,10).forEach(v=>{
    const d=document.createElement('div');d.className='vis-item';
    const av=v.avatar?`<img src="${v.avatar}">`:(v.emoji||'🧑');
    d.innerHTML=`<div class="vis-av">${av}</div><div class="vis-name">${esc(v.name)}</div><div class="vis-time">${timeAgo(v.ts)}</div>`;
    c.appendChild(d);
  });
}
function renderFavs(){
  const favIds=DB.favs(U.id);
  const c=document.getElementById('fav-list');c.innerHTML='';
  if(!favIds.length){c.innerHTML='<div class="empty" style="padding:18px"><div class="eico">⭐</div><p>还没有收藏任何动态</p></div>';return;}
  const ps=DB.posts();
  favIds.map(id=>ps.find(p=>p.id===id)).filter(Boolean).forEach(p=>c.appendChild(mkPost(p)));
}
function renderMyPosts(){
  const ps=DB.posts().filter(x=>x.uid===U.id).sort((a,b)=>b.ts-a.ts);
  const c=document.getElementById('my-posts');c.innerHTML='';
  if(!ps.length){c.innerHTML='<div class="empty" style="padding:18px"><div class="eico">📜</div><p>还没有发过动态</p></div>';return;}
  ps.forEach(p=>c.appendChild(mkPost(p)));
}
function saveProf(){
  const nm=_v('e-nm');if(!nm){toast('昵称不能为空');return;}
  U.name=nm;U.age=parseInt(_v('e-age'))||U.age;U.city=_v('e-city');U.job=_v('e-job');
  U.bio=document.getElementById('e-bio').value.trim();U.hobby=_v('e-hob');
  syncU();refreshNav();refreshHero();toast('✅ 资料已保存');
}
function changePwd(){
  const o=_v('p-old'),n=_v('p-new');
  if(!o||!n){toast('请填写当前密码和新密码');return;}
  if(o!==U.pwd){toast('当前密码不正确');return;}
  if(n.length<6){toast('新密码至少6位');return;}
  U.pwd=n;syncU();
  document.getElementById('p-old').value='';
  document.getElementById('p-new').value='';
  toast('🔒 密码修改成功');
}
function pickAv(){document.getElementById('av-inp').click();}
function applyAv(ev){
  const file=ev.target.files[0];if(!file)return;
  const img=new Image(),r=new FileReader();
  r.onload=e=>{img.onload=()=>{const cv=document.createElement('canvas');cv.width=cv.height=200;const ctx=cv.getContext('2d'),m=Math.min(img.width,img.height);ctx.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,200,200);U.avatar=cv.toDataURL('image/jpeg',.75);syncU();refreshNav();refreshHero();toast('🪬 头像已更新');};img.src=e.target.result;};
  r.readAsDataURL(file);ev.target.value='';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _v(id){return document.getElementById(id).value.trim();}
function _err(id,m){document.getElementById(id).textContent=m;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2600);}
function bigImg(src){document.getElementById('imodal-img').src=src;document.getElementById('imodal').classList.add('on');}
function timeAgo(ts){if(!ts)return'';const d=Math.floor((Date.now()-ts)/1000);if(d<60)return'刚刚';if(d<3600)return Math.floor(d/60)+'分钟前';if(d<86400)return Math.floor(d/3600)+'小时前';return Math.floor(d/86400)+'天前';}
</script>
