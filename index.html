<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <title>如玉社区 - 终极修复版</title>
    <!-- 使用稳定版 SDK -->
    <script src="https://imgcache.qq.com/qcloud/cloudbase-js-sdk/2.10.3/cloudbase.full.js"></script>
    <style>
        :root { --pink: #ff69b4; }
        body { margin: 0; background: #f5f5f5; font-family: sans-serif; }
        /* 背景图层 */
        .bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; 
               background: url('https://api.dujin.org/bing/1920.php') center/cover; filter: blur(10px); }
        
        .app { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.7); }
        header { background: var(--pink); color: white; padding: 15px; text-align: center; font-weight: bold; }
        
        /* 动态列表 */
        #flow { flex: 1; overflow-y: auto; padding: 10px; }
        .post { background: white; margin-bottom: 15px; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .post-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .ava { width: 40px; height: 40px; border-radius: 50%; background: #eee; }
        .nick { font-weight: bold; color: var(--pink); }
        .p-img { width: 100%; border-radius: 8px; margin-top: 8px; }

        /* 发布区域 */
        .bottom { background: white; padding: 15px; border-top: 1px solid #ddd; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
        .btn { background: var(--pink); color: white; border: none; padding: 8px 15px; border-radius: 15px; cursor: pointer; }
        
        /* 状态提示 */
        #status-tip { position: fixed; top: 0; width: 100%; background: red; color: white; font-size: 12px; text-align: center; z-index: 999; display: none; }
    </style>
</head>
<body>

<div id="status-tip">正在检测云端连接...</div>
<div class="bg"></div>

<div class="app">
    <header>如玉婚恋社区</header>
    <div id="flow"></div>

    <div class="bottom" id="action-bar" style="display: none;">
        <div class="input-row">
            <label style="cursor: pointer;">🖼️<input type="file" id="f-selector" accept="image/*" style="display:none" onchange="handleFile(this)"></label>
            <input type="text" id="p-text" placeholder="分享此刻心情...">
            <button class="btn" onclick="send()">发布</button>
        </div>
        <div id="pre-box" style="display:none; margin-top:10px;">
            <img id="img-pre" style="width:50px; height:50px; border-radius:5px;">
            <span style="font-size:12px; color:green;">已选中图片</span>
        </div>
    </div>

    <!-- 注册遮罩 -->
    <div id="reg-mask" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:100;">
        <div style="background:white; padding:30px; border-radius:20px; width:80%; text-align:center;">
            <h3>欢迎来到如玉</h3>
            <input type="text" id="my-nick" placeholder="给自己起个昵称" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ddd; border-radius:10px;">
            <button onclick="doJoin()" style="background:var(--pink); color:white; border:none; width:100%; padding:12px; border-radius:10px;">开始聊天</button>
        </div>
    </div>
</div>

<script>
    // 【核心】请再次确认环境 ID 是否准确
    const ENV_ID = 'ruyu-5glawvibc792700f'; 
    const app = cloudbase.init({ env: ENV_ID, region: 'ap-shanghai' });
    const db = app.database();
    let me = null;
    let fileToUpload = null;

    // 1. 初始化检测
    async function init() {
        const tip = document.getElementById('status-tip');
        try {
            const auth = app.auth();
            const login = await auth.getLoginState();
            if (!login) await auth.anonymousAuthProvider().signIn();
            console.log("云端已连接");
            loadData();
        } catch (e) {
            tip.style.display = 'block';
            tip.innerText = "错误：连不上腾讯云，请检查环境ID和安全域名！";
        }
    }

    // 2. 加载动态
    function loadData() {
        db.collection('chat_posts').orderBy('time', 'desc').limit(20).watch({
            onChange: (sn) => {
                const flow = document.getElementById('flow');
                flow.innerHTML = '';
                sn.docs.reverse().forEach(d => {
                    const post = document.createElement('div');
                    post.className = 'post';
                    post.innerHTML = `
                        <div class="post-top">
                            <img src="${d.avatar}" class="ava">
                            <span class="nick">${d.nickname}</span>
                        </div>
                        <div>${d.text}</div>
                        ${d.img ? `<img src="${d.img}" class="p-img">` : ''}
                    `;
                    flow.appendChild(post);
                });
                flow.scrollTop = flow.scrollHeight;
            },
            onError: (err) => {
                document.getElementById('status-tip').style.display = 'block';
                document.getElementById('status-tip').innerText = "数据库权限不足，请在后台开启集合权限";
            }
        });
    }

    // 3. 处理图片选中
    function handleFile(input) {
        if (input.files && input.files[0]) {
            fileToUpload = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('img-pre').src = e.target.result;
                document.getElementById('pre-box').style.display = 'block';
            }
            reader.readAsDataURL(fileToUpload);
        }
    }

    // 4. 发送动态
    async function send() {
        const txt = document.getElementById('p-text').value.trim();
        if (!txt && !fileToUpload) return;

        try {
            let imgUrl = "";
            if (fileToUpload) {
                // 上传
                const path = `posts/${Date.now()}_${fileToUpload.name}`;
                const res = await app.uploadFile({ cloudPath: path, filePath: fileToUpload });
                // 换取可访问链接
                const link = await app.getTempFileURL({ fileList: [res.fileID] });
                imgUrl = link.fileList[0].tempFileURL;
            }

            await db.collection('chat_posts').add({
                uid: me.uid,
                nickname: me.nickname,
                avatar: me.avatar,
                text: txt,
                img: imgUrl,
                time: new Date()
            });

            // 重置
            document.getElementById('p-text').value = '';
            document.getElementById('pre-box').style.display = 'none';
            fileToUpload = null;
        } catch (e) {
            alert("发布失败：可能是云存储未开通或数据库权限未设为 true");
        }
    }

    // 5. 加入社区
    function doJoin() {
        const nick = document.getElementById('my-nick').value.trim();
        if (!nick) return alert("写个名字吧");
        me = {
            nickname: nick,
            avatar: `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(nick)}`,
            uid: app.auth().hasLoginState().user.uid
        };
        document.getElementById('reg-mask').style.display = 'none';
        document.getElementById('action-bar').style.display = 'block';
    }

    init();
</script>
</body>
</html>
