<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>如玉婚恋</title>
    <!-- 引入最新的 2.0 SDK -->
    <script src="https://imgcache.qq.com/qcloud/cloudbase-js-sdk/2.10.3/cloudbase.full.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #fff0f5; }
        #chat-container { height: 100vh; display: flex; flex-direction: column; }
        #header { background: white; padding: 15px; text-align: center; color: #ff69b4; font-weight: bold; border-bottom: 1px solid #ffe4e1; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; }
        #input-area { background: white; padding: 10px; display: flex; border-top: 1px solid #ffe4e1; padding-bottom: 30px; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #ff69b4; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-left: 10px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; background: white; width: fit-content; max-width: 80%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">如玉婚恋</div>
    <div id="messages">正在加载聊天记录...</div>
    <div id="input-area">
        <input type="text" id="text-input" placeholder="说点什么吧...">
        <button onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    // 适配 2.0 SDK 的初始化
    const app = cloudbase.init({
        env: 'ruyu-5glawvibc792700f',
        region: 'ap-shanghai'
    });

    const db = app.database();
    const auth = app.auth();

    async function init() {
        try {
            // 匿名登录
            const loginState = await auth.getLoginState();
            if (!loginState) {
                await auth.anonymousAuthProvider().signIn();
            }
            
            // 开始监听消息
            db.collection('chat_msgs')
                .orderBy('time', 'asc')
                .watch({
                    onChange: (snapshot) => {
                        const msgDiv = document.getElementById('messages');
                        msgDiv.innerHTML = '';
                        snapshot.docs.forEach(doc => {
                            const div = document.createElement('div');
                            div.className = 'msg';
                            div.innerText = doc.text;
                            msgDiv.appendChild(div);
                        });
                        msgDiv.scrollTop = msgDiv.scrollHeight;
                    },
                    onError: (err) => {
                        console.error('监听错误:', err);
                    }
                });
        } catch (e) {
            alert("系统初始化失败，请稍后刷新");
        }
    }

    async function sendMsg() {
        const input = document.getElementById('text-input');
        if (!input.value.trim()) return;
        try {
            await db.collection('chat_msgs').add({
                text: input.value,
                time: new Date()
            });
            input.value = '';
        } catch (e) {
            alert("发送失败，请检查数据库权限");
        }
    }

    init();
</script>
</body>
</html>
