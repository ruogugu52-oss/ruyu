<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>如玉婚恋</title>
    <!-- 引入腾讯云 SDK -->
    <script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.8/tcb.js"></script>
    <style>
        /* 简单样式美化 */
        body { margin: 0; font-family: sans-serif; background-color: #fff0f5; }
        #chat-container { height: 100vh; display: flex; flex-direction: column; }
        #header { background: white; padding: 15px; text-align: center; color: #ff69b4; font-weight: bold; border-bottom: 1px solid #ffe4e1; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; }
        #input-area { background: white; padding: 10px; display: flex; border-top: 1px solid #ffe4e1; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #ff69b4; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-left: 10px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; background: white; max-width: 80%; width: fit-content; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">如玉婚恋</div>
    <div id="messages">正在连接服务器...</div>
    <div id="input-area">
        <input type="text" id="text-input" placeholder="输入消息...">
        <button onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    // 1. 初始化云开发 (已根据你的后台信息修改)
    const app = tcb.init({
        env: 'ruyu-5glawvibc792700f',
        region: 'ap-shanghai' 
    });

    const db = app.database();
    const auth = app.auth();

    async function initChat() {
        try {
            // 2. 匿名登录
            const loginState = await auth.getLoginState();
            if (!loginState) {
                await auth.anonymousAuthProvider().signIn();
            }

            // 3. 监听消息（确保你已经在后台手动创建了 chat_msgs 集合）
            db.collection('chat_msgs')
                .watch({
                    onChange: (snapshot) => {
                        const msgDiv = document.getElementById('messages');
                        msgDiv.innerHTML = '';
                        snapshot.docs.forEach(doc => {
                            const div = document.createElement('div');
                            div.className = 'msg';
                            div.innerText = doc.text;
                            msgDiv.appendChild(div);
                        });
                        msgDiv.scrollTop = msgDiv.scrollHeight;
                    },
                    onError: (err) => {
                        console.error('监听失败', err);
                        alert('连接失败，请检查数据库权限或集合是否存在');
                    }
                });
        } catch (e) {
            console.error(e);
            alert('初始化失败: ' + e.message);
        }
    }

    // 4. 发送消息
    async function sendMsg() {
        const input = document.getElementById('text-input');
        const text = input.value.trim();
        if (!text) return;

        try {
            await db.collection('chat_msgs').add({
                text: text,
                time: new Date()
            });
            input.value = '';
        } catch (e) {
            alert('发送失败，请确认数据库权限已设为“所有人可读”');
        }
    }

    initChat();
</script>

</body>
</html>
