<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>如玉社区</title>
<script src="https://cdn.jsdelivr.net/npm/tcb-js-sdk/dist/index.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;}
body{background:#fff5f8;}
#root{position:fixed;inset:0;display:flex;flex-direction:column;}
.pg{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .22s cubic-bezier(.22,1,.36,1);transform:translateX(28px);}
.pg.on{opacity:1;pointer-events:all;transform:translateX(0);}
.chat-top{flex-shrink:0;height:52px;display:flex;align-items:center;padding:0 16px;background:#fff;border-bottom:1px solid #ffe4ee;position:relative;}
.ct-left{display:flex;align-items:center;gap:12px;}
.ct-icon{width:32px;height:32px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ct-title{position:absolute;left:50%;transform:translateX(-50%);font-size:16px;font-weight:600;color:#111;letter-spacing:.3px;white-space:nowrap;pointer-events:none;}
.ct-right{display:flex;align-items:center;gap:4px;margin-left:auto;}
.ct-star{font-size:22px;line-height:1;background:none;border:none;cursor:pointer;padding:4px;}
.ct-city{font-size:15px;font-weight:600;color:#07c160;background:none;border:none;cursor:pointer;font-family:inherit;padding:5px 6px;}
.chat-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 10px;display:flex;flex-direction:column;gap:13px;background:#fff5f8;}
.time-sep{text-align:center;font-size:11px;color:#c0a8b4;background:rgba(255,255,255,.65);border-radius:10px;padding:3px 12px;margin:0 auto;}
.mrow{display:flex;gap:9px;align-items:flex-start;}
.mrow.me{flex-direction:row-reverse;}
.m-av{width:43px;height:43px;border-radius:50%;flex-shrink:0;overflow:hidden;cursor:pointer;border:2.5px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.13);background:#ffccd8;display:flex;align-items:center;justify-content:center;font-size:20px;}
.m-av img{width:100%;height:100%;object-fit:cover;}
.m-col{max-width:74%;display:flex;flex-direction:column;gap:4px;}
.mrow.me .m-col{align-items:flex-end;}
.m-meta{font-size:11px;color:#c0a8b4;display:flex;align-items:center;gap:8px;padding:0 2px;}
.mrow.me .m-meta{flex-direction:row-reverse;}
.m-time{font-size:10px;color:#d8b0c0;}
.bubble{display:inline-block;padding:10px 15px;border-radius:22px;font-size:15px;line-height:1.62;word-break:break-word;background:#ff6b9d;color:#fff;box-shadow:0 2px 8px rgba(255,107,157,.26);cursor:pointer;}
.mrow.me .bubble{background:#5b9cf6;box-shadow:0 2px 8px rgba(91,156,246,.26);}
.m-img{border-radius:14px;overflow:hidden;cursor:pointer;max-width:232px;box-shadow:0 2px 12px rgba(0,0,0,.13);}
.m-img img{width:100%;display:block;}
.coms{background:rgba(255,255,255,.85);border-radius:14px;padding:8px 12px;border:1px solid #ffc8d8;max-width:288px;margin-top:3px;display:none;}
.coms.open{display:block;}
.com-item{font-size:12px;color:#2a0814;padding:2px 0;line-height:1.5;}
.com-name{color:#e02050;font-weight:600;}
.com-add{display:flex;gap:6px;margin-top:7px;padding-top:7px;border-top:1px solid #ffc8d8;}
.com-inp{flex:1;padding:5px 11px;border:1px solid #ffc8d8;border-radius:14px;background:#fff;font-family:inherit;font-size:12px;color:#2a0814;outline:none;}
.com-inp::placeholder{color:#f0a8bc;}
.com-btn{padding:5px 13px;background:#e02050;color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:12px;cursor:pointer;}
.chat-bar{flex-shrink:0;padding:9px 12px 16px;background:#fff;border-top:1px solid #ffe4ee;display:flex;align-items:center;gap:8px;}
.bar-cam{width:36px;height:36px;border-radius:50%;background:#f6f0f4;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bar-inp{flex:1;padding:9px 16px;border:1.5px solid #ffdcea;border-radius:22px;background:#fff8fa;font-family:inherit;font-size:14px;color:#2a0814;outline:none;min-height:40px;max-height:80px;resize:none;line-height:1.4;}
.bar-inp::placeholder{color:#ddaabc;}.bar-inp:focus{border-color:#ff6b9d;}
.bar-join{padding:10px 20px;background:#ff6b9d;color:#fff;border:none;border-radius:22px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;box-shadow:0 3px 12px rgba(255,107,157,.36);transition:transform .13s;}
.bar-join:active{transform:scale(.96);}
.bar-send{width:40px;height:40px;border-radius:50%;background:#ff6b9d;color:#fff;border:none;display:none;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;box-shadow:0 3px 12px rgba(255,107,157,.36);}
.setup-top{flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#fff;border-bottom:1px solid #ffe4ee;}
.st-back{font-size:24px;color:#e02050;background:none;border:none;cursor:pointer;line-height:1;}
.st-title{font-size:16px;font-weight:600;color:#111;}
.st-save{font-size:15px;font-weight:600;color:#e02050;background:none;border:none;font-family:inherit;cursor:pointer;}
.setup-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 16px 44px;background:#fff5f8;}
.av-pick{width:88px;height:88px;border-radius:50%;margin:0 auto 20px;background:#ffccd8;border:3px solid #fff;box-shadow:0 4px 18px rgba(255,107,157,.2);display:flex;align-items:center;justify-content:center;font-size:40px;cursor:pointer;overflow:hidden;position:relative;}
.av-pick img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.av-pick:active::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:26px;border-radius:50%;}
.form-card{background:#fff;border-radius:18px;padding:18px;margin-bottom:13px;box-shadow:0 2px 14px rgba(255,107,157,.06);}
.fc-t{font-size:12px;font-weight:600;color:#e02050;margin-bottom:13px;letter-spacing:1px;}
.ff{display:flex;flex-direction:column;gap:12px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fl{font-size:12px;color:#c0a8b4;margin-bottom:3px;}
.fi{width:100%;padding:10px 13px;border:1.5px solid #ffdcea;border-radius:12px;background:#fff8fa;font-size:14px;font-family:inherit;color:#2a0814;outline:none;}
.fi:focus{border-color:#ff6b9d;}.fi::placeholder{color:#e8b0c4;}
.fta{width:100%;padding:10px 13px;border:1.5px solid #ffdcea;border-radius:12px;background:#fff8fa;font-size:14px;font-family:inherit;color:#2a0814;outline:none;resize:none;min-height:70px;}
.fta::placeholder{color:#e8b0c4;}
.gbr{display:flex;gap:10px;}
.gb{flex:1;padding:10px;border:1.5px solid #ffdcea;border-radius:12px;background:#fff8fa;cursor:pointer;font-size:14px;font-family:inherit;color:#c0a8b4;transition:all .15s;}
.gb.on{border-color:#ff6b9d;background:#fff0f4;color:#e02050;font-weight:500;}
.save-big{width:100%;padding:14px;border:none;border-radius:15px;background:#ff6b9d;color:#fff;font-family:inherit;font-size:15px;font-weight:500;letter-spacing:2px;cursor:pointer;box-shadow:0 5px 18px rgba(255,107,157,.28);margin-top:5px;}
.user-top{flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#fff;border-bottom:1px solid #ffe4ee;}
.ut-back{font-size:24px;color:#e02050;background:none;border:none;cursor:pointer;}
.ut-title{font-size:16px;font-weight:600;color:#111;}
.user-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 24px;background:#fff5f8;}
.user-card{background:#fff;border-radius:20px;padding:20px 16px;margin-bottom:13px;box-shadow:0 2px 14px rgba(255,107,157,.08);}
.uc-top{display:flex;align-items:center;gap:13px;margin-bottom:13px;}
.uc-av{width:66px;height:66px;border-radius:50%;background:#ffccd8;border:2.5px solid #fff;box-shadow:0 2px 9px rgba(255,107,157,.16);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;flex-shrink:0;}
.uc-av img{width:100%;height:100%;object-fit:cover;}
.uc-name{font-size:18px;font-weight:600;color:#111;}
.uc-info{font-size:12px;color:#c0a8b4;margin-top:3px;}
.uc-bio{font-size:14px;color:#2a0814;line-height:1.75;padding-top:12px;border-top:1px solid #ffe4ee;}
.uc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.utag{padding:3px 10px;border-radius:8px;font-size:12px;background:#fff0f4;color:#e02050;border:1px solid #ffccd8;}
.posts-title{font-size:13px;font-weight:600;color:#e02050;margin-bottom:11px;letter-spacing:.5px;}
.post-card{background:#fff;border-radius:15px;padding:13px;margin-bottom:10px;box-shadow:0 2px 11px rgba(255,107,157,.06);}
.pc-text{font-size:14px;line-height:1.75;color:#2a0814;white-space:pre-wrap;margin-bottom:8px;}
.pc-imgs{display:grid;gap:3px;border-radius:10px;overflow:hidden;margin-bottom:8px;}
.pc-imgs.one{grid-template-columns:1fr;}
.pc-imgs img{width:100%;aspect-ratio:4/3;object-fit:cover;cursor:pointer;}
.pc-meta{font-size:11px;color:#c0a8b4;margin-bottom:8px;}
.pc-coms{padding-top:9px;border-top:1px solid #ffe4ee;}
.pc-com{font-size:13px;color:#2a0814;padding:2px 0;line-height:1.5;}
.pc-cnm{color:#e02050;font-weight:600;}
.pc-add{display:flex;gap:6px;margin-top:8px;}
.pc-inp{flex:1;padding:7px 12px;border:1.5px solid #ffdcea;border-radius:16px;background:#fff8fa;font-family:inherit;font-size:13px;color:#2a0814;outline:none;}
.pc-inp::placeholder{color:#e8b0c4;}.pc-inp:focus{border-color:#ff6b9d;}
.pc-btn{padding:7px 13px;background:#ff6b9d;color:#fff;border:none;border-radius:16px;font-family:inherit;font-size:13px;cursor:pointer;}
.mask{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.38);backdrop-filter:blur(4px);display:none;align-items:flex-end;}
.mask.on{display:flex;}
.menu-sheet{background:#fff;border-radius:22px 22px 0 0;padding:18px 14px 36px;width:100%;animation:slideUp .22s cubic-bezier(.22,1,.36,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ms-hint{font-size:12px;color:#c0a8b4;text-align:center;margin-bottom:15px;}
.ms-list{display:flex;flex-direction:column;gap:9px;}
.ms-btn{display:flex;align-items:center;gap:13px;padding:15px 16px;border:none;border-radius:15px;background:#fff5f8;cursor:pointer;font-family:inherit;font-size:15px;color:#111;font-weight:500;width:100%;text-align:left;transition:background .13s;}
.ms-btn:active{background:#ffe0ec;}.ms-btn.danger{color:#e02050;}.ms-btn.cancel{background:#f2f2f2;color:#888;}
.ms-ic{font-size:21px;width:26px;text-align:center;flex-shrink:0;}
.fav-bar{position:fixed;top:62px;left:50%;transform:translateX(-50%) translateY(-14px);background:#fff;border-radius:16px;padding:12px 18px;box-shadow:0 8px 26px rgba(255,107,157,.22);border:1px solid #ffccd8;display:none;align-items:center;gap:11px;z-index:200;white-space:nowrap;}
.fav-bar.on{display:flex;animation:favIn .26s ease;}
@keyframes favIn{from{opacity:0;transform:translateX(-50%) translateY(-24px)}to{opacity:1;transform:translateX(-50%) translateY(-14px)}}
.fb-ic{font-size:22px;}.fb-main{font-size:14px;font-weight:500;color:#111;}.fb-sub{font-size:11px;color:#c0a8b4;margin-top:1px;}
.empty{text-align:center;padding:28px 20px;color:#ddaabc;}
.empty-ic{font-size:28px;margin-bottom:6px;opacity:.38;}.empty-tx{font-size:13px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(36px);background:rgba(36,6,14,.87);color:#fff;padding:10px 22px;border-radius:18px;font-size:13px;z-index:999;transition:transform .18s;pointer-events:none;backdrop-filter:blur(8px);}
#toast.on{transform:translateX(-50%) translateY(0);}
.img-view{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;display:none;align-items:center;justify-content:center;}
.img-view.on{display:flex;}
.img-view img{max-width:92vw;max-height:88vh;border-radius:11px;}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:rgba(255,107,157,.15);border-radius:2px;}
</style>
</head>
<body>
<div id="root">
  <div class="pg on" id="pg-chat">
    <div class="chat-top">
      <div class="ct-left">
        <button class="ct-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#07c160" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="ct-title">如玉公益婚恋</div>
      <div class="ct-right">
        <button class="ct-star" id="ct-star" onclick="toggleFav()">☆</button>
        <button class="ct-city" id="ct-city" onclick="ME&&ME.name?openMenu():navTo('setup')"></button>
      </div>
    </div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-bar">
      <label class="bar-cam">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="13" r="3"/><path d="M20 7h-3.5l-1.5-2h-6L7.5 7H4a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1z"/>
        </svg>
        <input type="file" accept="image/*" style="display:none" onchange="sendImage(event)">
      </label>
      <textarea class="bar-inp" id="bar-inp" placeholder="上个聊天" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleSend()}" rows="1"></textarea>
      <button class="bar-join" id="bar-join" onclick="ME&&ME.name?handleSend():navTo('setup')">加入聊天</button>
      <button class="bar-send" id="bar-send" onclick="handleSend()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="pg" id="pg-setup">
    <div class="setup-top">
      <button class="st-back" onclick="navTo('chat')">‹</button>
      <div class="st-title">我的资料</div>
      <button class="st-save" onclick="doSaveSetup()">保存</button>
    </div>
    <div class="setup-scroll">
      <div class="av-pick" id="av-pick" onclick="triggerAv()">😊</div>
      <div class="form-card">
        <div class="fc-t">基本信息</div>
        <div class="ff">
          <div class="fr">
            <div><div class="fl">昵 称</div><input class="fi" id="s-name" placeholder="你的名字"></div>
            <div><div class="fl">年 龄</div><input class="fi" id="s-age" type="number" placeholder="年龄" min="18" max="99"></div>
          </div>
          <div class="fr">
            <div><div class="fl">城 市</div>
              <select class="fi" id="s-city" style="cursor:pointer">
                <option value="">选择城市</option>
                <option>北京</option><option>上海</option><option>广州</option>
                <option>深圳</option><option>成都</option><option>杭州</option>
                <option>南京</option><option>武汉</option><option>西安</option>
                <option>重庆</option><option>其他</option>
              </select>
            </div>
            <div><div class="fl">职 业</div><input class="fi" id="s-job" placeholder="职业"></div>
          </div>
          <div><div class="fl">性 别</div>
            <div class="gbr">
              <button class="gb" onclick="setGender(this,'female')">👩 女士</button>
              <button class="gb" onclick="setGender(this,'male')">👨 先生</button>
            </div>
          </div>
          <div><div class="fl">个人简介</div><textarea class="fta" id="s-bio" placeholder="简单介绍一下自己～"></textarea></div>
          <div><div class="fl">兴趣爱好（逗号分隔）</div><input class="fi" id="s-hobby" placeholder="旅行, 读书, 烹饪..."></div>
        </div>
      </div>
      <button class="save-big" onclick="doSaveSetup()">保 存 并 加 入 聊 天</button>
    </div>
  </div>
  <div class="pg" id="pg-user">
    <div class="user-top">
      <button class="ut-back" onclick="navTo('chat')">‹</button>
      <div class="ut-title" id="ut-title">用户资料</div>
      <div style="width:32px"></div>
    </div>
    <div class="user-scroll">
      <div class="user-card" id="user-card"></div>
      <div class="posts-title">Ta 的动态</div>
      <div id="user-posts"></div>
    </div>
  </div>
</div>
<div class="mask" id="mask" onclick="if(event.target===this)closeMask()">
  <div class="menu-sheet">
    <div class="ms-hint">如玉社区</div>
    <div class="ms-list">
      <button class="ms-btn" onclick="closeMask();navTo('setup')"><span class="ms-ic">✏️</span>编辑我的资料</button>
      <button class="ms-btn" onclick="closeMask();toggleFav()"><span class="ms-ic" id="ms-fav-ic">☆</span><span id="ms-fav-tx">收藏到屏幕推荐</span></button>
      <button class="ms-btn danger" onclick="closeMask();doExit()"><span class="ms-ic">🚪</span>退出聊天室</button>
      <button class="ms-btn cancel" onclick="closeMask()"><span class="ms-ic" style="opacity:.35">✕</span>取消</button>
    </div>
  </div>
</div>
<div class="fav-bar" id="fav-bar">
  <span class="fb-ic">⭐</span>
  <div><div class="fb-main">已收藏到推荐！</div><div class="fb-sub">Safari：点分享键 → 添加到主屏幕</div></div>
</div>
<input type="file" id="av-file" accept="image/*" style="display:none" onchange="applyAvatar(event)">
<div id="toast"></div>
<div class="img-view" id="img-view" onclick="this.classList.remove('on')"><img id="img-view-src" src="" alt=""></div>
<script>
const ENV_ID='ruyu-5glawvibc792700f';
let app,db,ME,gSel='',pollTimer=null,lastTs=0;

async function initCloud(){
  try{
    app=tcb.init({env:ENV_ID});
    const auth=app.auth({persistence:'local'});
    await auth.anonymousAuthProvider().signIn();
    db=app.database();
    const saved=localStorage.getItem('ruyu_me');
    ME=saved?JSON.parse(saved):{id:'u'+Date.now(),name:'',age:'',city:'',job:'',gender:'',bio:'',hobby:'',avatar:null,emoji:'😊'};
    gSel=ME.gender||'';
    syncUI();syncFavUI();
    await loadMsgs();
    startPoll();
  }catch(e){
    console.error('cloud init fail',e);
    ME=JSON.parse(localStorage.getItem('ruyu_me')||'null')||{id:'u'+Date.now(),name:'',age:'',city:'',job:'',gender:'',bio:'',hobby:'',avatar:null,emoji:'😊'};
    gSel=ME.gender||'';
    syncUI();syncFavUI();
    toast('⚠️ 云端连接失败，本地模式');
  }
}

async function loadMsgs(){
  try{
    const res=await db.collection('chat_msgs').orderBy('ts','asc').limit(100).get();
    const box=document.getElementById('chat-msgs');box.innerHTML='';
    const msgs=res.data||[];
    msgs.forEach(m=>box.appendChild(buildMsgEl(m)));
    if(msgs.length>0)lastTs=msgs[msgs.length-1].ts||0;
    scrollToBottom();
  }catch(e){console.error('loadMsgs',e);}
}

function startPoll(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(!db)return;
    try{
      const res=await db.collection('chat_msgs').where({ts:db.command.gt(lastTs)}).orderBy('ts','asc').limit(20).get();
      const msgs=res.data||[];
      if(!msgs.length)return;
      const box=document.getElementById('chat-msgs');
      msgs.forEach(m=>{
        const id=m._id;
        if(document.getElementById('mrow-'+id))return;
        box.appendChild(buildMsgEl(m));
        lastTs=Math.max(lastTs,m.ts||0);
      });
      scrollToBottom();
    }catch(e){}
  },3000);
}

function syncUI(){
  const j=document.getElementById('bar-join'),s=document.getElementById('bar-send');
  const i=document.getElementById('bar-inp'),c=document.getElementById('ct-city');
  if(ME&&ME.name){j.style.display='none';s.style.display='flex';i.placeholder='说点什么...';c.textContent=ME.city||'';}
  else{j.style.display='block';s.style.display='none';i.placeholder='上个聊天';c.textContent='';}
}

function syncFavUI(){
  const f=localStorage.getItem('ruyu_fav')==='1';
  document.getElementById('ct-star').textContent=f?'⭐':'☆';
  document.getElementById('ms-fav-ic').textContent=f?'⭐':'☆';
  document.getElementById('ms-fav-tx').textContent=f?'取消推荐收藏':'收藏到屏幕推荐';
}

function buildMsgEl(m){
  const id=m._id||m.id;
  const isMe=ME&&m.uid===ME.id;
  const wrap=document.createElement('div');
  wrap.className='mrow'+(isMe?' me':'');
  wrap.id='mrow-'+id;
  const avHTML=m.av?`<img src="${m.av}">`:(m.emoji||'😊');
  const timeStr=formatTime(m.ts);
  let cnt=m.type==='img'
    ?`<div class="m-img" onclick="viewImg('${m.imgUrl}')"><img src="${m.imgUrl}" loading="lazy"></div>`
    :`<div class="bubble">${esc(m.text)}</div>`;
  const ch=(m.coms||[]).map(c=>`<div class="com-item"><span class="com-name">${esc(c.n)}：</span>${esc(c.t)}</div>`).join('');
  wrap.innerHTML=`
    <div class="m-av" onclick="openUser('${m.uid}')">${avHTML}</div>
    <div class="m-col">
      <div class="m-meta"><span>${esc(m.name)}</span>${m.city?`<span style="font-size:10px;color:#d8b0c0">${m.city}</span>`:''}<span class="m-time">${timeStr}</span></div>
      ${cnt}
      <div class="coms ${ch?'open':''}" id="coms-${id}">
        <div id="coms-list-${id}">${ch}</div>
        <div class="com-add" id="com-add-${id}" style="display:none">
          <input class="com-inp" id="com-inp-${id}" placeholder="写评论...">
          <button class="com-btn" onclick="submitCom('${id}')">发送</button>
        </div>
      </div>
    </div>`;
  const bub=wrap.querySelector('.bubble');
  if(bub)bub.onclick=()=>toggleComBox(id);
  return wrap;
}

function toggleComBox(mid){
  if(!ME||!ME.name){navTo('setup');return;}
  const box=document.getElementById('coms-'+mid),add=document.getElementById('com-add-'+mid);
  if(!box||!add)return;
  box.classList.add('open');
  add.style.display=add.style.display==='none'?'flex':'none';
  if(add.style.display==='flex')document.getElementById('com-inp-'+mid)?.focus();
}

async function submitCom(mid){
  if(!ME||!ME.name){navTo('setup');return;}
  const inp=document.getElementById('com-inp-'+mid);
  const text=inp?.value.trim();if(!text)return;
  try{
    const res=await db.collection('chat_msgs').doc(mid).get();
    const m=res.data[0];if(!m)return;
    const coms=m.coms||[];
    coms.push({n:ME.name,t:text,uid:ME.id});
    await db.collection('chat_msgs').doc(mid).update({coms});
    inp.value='';
    const list=document.getElementById('coms-list-'+mid);
    if(list){const d=document.createElement('div');d.className='com-item';d.innerHTML=`<span class="com-name">${esc(ME.name)}：</span>${esc(text)}`;list.appendChild(d);}
    document.getElementById('com-add-'+mid).style.display='none';
    toast('评论成功！💌');
  }catch(e){toast('评论失败');}
}

async function handleSend(){
  if(!ME||!ME.name){navTo('setup');return;}
  const inp=document.getElementById('bar-inp');
  const text=inp.value.trim();if(!text)return;
  inp.value='';
  try{
    const res=await db.collection('chat_msgs').add({
      uid:ME.id,name:ME.name,emoji:ME.emoji||'😊',
      av:ME.avatar||null,city:ME.city||'',
      type:'text',text,ts:Date.now(),coms:[]
    });
    const newId=res.id;
    const box=document.getElementById('chat-msgs');
    if(!document.getElementById('mrow-'+newId)){
      const m={_id:newId,uid:ME.id,name:ME.name,emoji:ME.emoji||'😊',av:ME.avatar||null,city:ME.city||'',type:'text',text,ts:Date.now(),coms:[]};
      box.appendChild(buildMsgEl(m));
      lastTs=Math.max(lastTs,m.ts);
      scrollToBottom();
    }
  }catch(e){toast('发送失败，请重试');inp.value=text;}
}

async function sendImage(ev){
  if(!ME||!ME.name){navTo('setup');return;}
  const file=ev.target.files[0];if(!file)return;
  ev.target.value='';
  toast('图片上传中...');
  const reader=new FileReader();
  reader.onload=async e=>{
    const img=new Image();
    img.onload=async()=>{
      const cv=document.createElement('canvas');
      const maxW=300,r=Math.min(maxW/img.width,maxW/img.height,1);
      cv.width=img.width*r;cv.height=img.height*r;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      const imgUrl=cv.toDataURL('image/jpeg',.5);
      try{
        const res=await db.collection('chat_msgs').add({
          uid:ME.id,name:ME.name,emoji:ME.emoji||'😊',
          av:ME.avatar||null,city:ME.city||'',
          type:'img',imgUrl,ts:Date.now(),coms:[]
        });
        const newId=res.id;
        const box=document.getElementById('chat-msgs');
        if(!document.getElementById('mrow-'+newId)){
          const m={_id:newId,uid:ME.id,name:ME.name,emoji:ME.emoji||'😊',av:ME.avatar||null,city:ME.city||'',type:'img',imgUrl,ts:Date.now(),coms:[]};
          box.appendChild(buildMsgEl(m));
          lastTs=Math.max(lastTs,m.ts);
          scrollToBottom();
        }
        toast('图片发送成功 🖼');
      }catch(e){toast('图片发送失败，请重试');}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
async function openUser(uid){
  try{
    let u=null;
    if(uid===ME.id){u=ME;}
    else{
      const res=await db.collection('users').where({id:uid}).limit(1).get();
      u=res.data[0]||null;
    }
    if(!u)return;
    document.getElementById('ut-title').textContent=u.name||'用户资料';
    const tags=(u.hobby||'').split(',').filter(Boolean);
    document.getElementById('user-card').innerHTML=`
      <div class="uc-top">
        <div class="uc-av">${u.avatar?`<img src="${u.avatar}">`:(u.emoji||'😊')}</div>
        <div>
          <div class="uc-name">${esc(u.name||'匿名')}</div>
          <div class="uc-info">${u.age?u.age+'岁':''}${u.city?' · '+u.city:''}${u.job?' · '+u.job:''} ${u.gender==='female'?'👩':u.gender==='male'?'👨':''}</div>
        </div>
      </div>
      ${u.bio?`<div class="uc-bio">${esc(u.bio)}</div>`:''}
      ${tags.length?`<div class="uc-tags">${tags.map(t=>`<span class="utag">${esc(t.trim())}</span>`).join('')}</div>`:''}`;
    const msgsRes=await db.collection('chat_msgs').where({uid}).orderBy('ts','desc').limit(20).get();
    const pe=document.getElementById('user-posts');pe.innerHTML='';
    if(!msgsRes.data.length){
      pe.innerHTML='<div class="empty"><div class="empty-ic">💭</div><div class="empty-tx">还没有发过动态</div></div>';
    }else{
      msgsRes.data.forEach(m=>{
        const mid=m._id;
        const d=document.createElement('div');d.className='post-card';
        const coms=(m.coms||[]).map(c=>`<div class="pc-com"><span class="pc-cnm">${esc(c.n)}：</span>${esc(c.t)}</div>`).join('');
        const body=m.type==='img'?`<div class="pc-imgs one"><img src="${m.imgUrl}" onclick="viewImg('${m.imgUrl}')"></div>`:`<div class="pc-text">${esc(m.text)}</div>`;
        d.innerHTML=`${body}<div class="pc-meta">📍${m.city||''} · ${timeAgo(m.ts)}</div>
          <div class="pc-coms"><div id="ucl-${mid}">${coms}</div>
            <div class="pc-add"><input class="pc-inp" id="uci-${mid}" placeholder="写评论..."><button class="pc-btn" onclick="submitUserCom('${mid}')">评论</button></div>
          </div>`;
        pe.appendChild(d);
      });
    }
    navTo('user');
  }catch(e){toast('加载失败');}
}

async function submitUserCom(mid){
  if(!ME||!ME.name){navTo('setup');return;}
  const inp=document.getElementById('uci-'+mid);
  const text=inp?.value.trim();if(!text)return;
  try{
    const res=await db.collection('chat_msgs').doc(mid).get();
    const m=res.data[0];if(!m)return;
    const coms=m.coms||[];
    coms.push({n:ME.name,t:text,uid:ME.id});
    await db.collection('chat_msgs').doc(mid).update({coms});
    inp.value='';
    const ul=document.getElementById('ucl-'+mid);
    if(ul){const d=document.createElement('div');d.className='pc-com';d.innerHTML=`<span class="pc-cnm">${esc(ME.name)}：</span>${esc(text)}`;ul.appendChild(d);}
    const cl=document.getElementById('coms-list-'+mid);
    if(cl){const d=document.createElement('div');d.className='com-item';d.innerHTML=`<span class="com-name">${esc(ME.name)}：</span>${esc(text)}`;cl.appendChild(d);document.getElementById('coms-'+mid)?.classList.add('open');}
    toast('评论成功！💌');
  }catch(e){toast('评论失败');}
}

function toggleFav(){
  const now=localStorage.getItem('ruyu_fav')!=='1';
  localStorage.setItem('ruyu_fav',now?'1':'0');syncFavUI();
  if(now){const bar=document.getElementById('fav-bar');bar.classList.add('on');setTimeout(()=>bar.classList.remove('on'),3500);}
  else toast('已取消收藏推荐');
}

function openMenu(){document.getElementById('mask').classList.add('on');}
function closeMask(){document.getElementById('mask').classList.remove('on');}

function doExit(){
  ME={id:'u'+Date.now(),name:'',age:'',city:'',job:'',gender:'',bio:'',hobby:'',avatar:null,emoji:'😊'};
  localStorage.removeItem('ruyu_me');gSel='';syncUI();
  toast('👋 已退出聊天室');navTo('chat');
}

function prepSetup(){
  document.getElementById('s-name').value=ME.name||'';
  document.getElementById('s-age').value=ME.age||'';
  document.getElementById('s-city').value=ME.city||'';
  document.getElementById('s-job').value=ME.job||'';
  document.getElementById('s-bio').value=ME.bio||'';
  document.getElementById('s-hobby').value=ME.hobby||'';
  gSel=ME.gender||'';
  document.querySelectorAll('.gb').forEach(b=>b.classList.toggle('on',
    (b.textContent.includes('女')&&gSel==='female')||(b.textContent.includes('先')&&gSel==='male')));
  const av=document.getElementById('av-pick');
  av.innerHTML=ME.avatar?`<img src="${ME.avatar}">`:(ME.emoji||'😊');
}

function setGender(btn,g){gSel=g;document.querySelectorAll('.gb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}

async function doSaveSetup(){
  const name=document.getElementById('s-name').value.trim();
  if(!name){toast('请填写昵称');return;}
  ME.name=name;ME.age=document.getElementById('s-age').value;
  ME.city=document.getElementById('s-city').value;ME.job=document.getElementById('s-job').value.trim();
  ME.bio=document.getElementById('s-bio').value.trim();ME.hobby=document.getElementById('s-hobby').value.trim();
  ME.gender=gSel;ME.emoji=gSel==='female'?'👩':gSel==='male'?'👨':'😊';
  localStorage.setItem('ruyu_me',JSON.stringify(ME));
  try{
    const res=await db.collection('users').where({id:ME.id}).limit(1).get();
    if(res.data.length){await db.collection('users').doc(res.data[0]._id).update(ME);}
    else{await db.collection('users').add(ME);}
  }catch(e){console.error('save user',e);}
  syncUI();toast('🎉 资料已保存！');navTo('chat');
}

function triggerAv(){document.getElementById('av-file').click();}
function applyAvatar(ev){
  const file=ev.target.files[0];if(!file)return;
  const img=new Image(),r=new FileReader();
  r.onload=e=>{img.onload=()=>{
    const cv=document.createElement('canvas');cv.width=cv.height=200;
    const ctx=cv.getContext('2d'),m=Math.min(img.width,img.height);
    ctx.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,200,200);
    ME.avatar=cv.toDataURL('image/jpeg',.7);ME.emoji='';
    localStorage.setItem('ruyu_me',JSON.stringify(ME));
    document.getElementById('av-pick').innerHTML=`<img src="${ME.avatar}">`;
    syncUI();toast('🖼 头像已更新');
  };img.src=e.target.result;};
  r.readAsDataURL(file);ev.target.value='';
}

function navTo(pageId){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('pg-'+pageId).classList.add('on');
  if(pageId==='setup')prepSetup();
  if(pageId==='chat')scrollToBottom();
}
function scrollToBottom(){setTimeout(()=>{const b=document.getElementById('chat-msgs');if(b)b.scrollTop=b.scrollHeight;},60);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function formatTime(ts){if(!ts)return'';const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function timeAgo(ts){if(!ts)return'';const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';return Math.floor(s/86400)+'天前';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2600);}
function viewImg(src){document.getElementById('img-view-src').src=src;document.getElementById('img-view').classList.add('on');}

initCloud();
</script>
